<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Inventaire Mobile Dream Market</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #e0e7ff;
            --success: #10b981;
            --success-dark: #059669;
            --success-light: #d1fae5;
            --warning: #f59e0b;
            --warning-light: #fef3c7;
            --danger: #ef4444;
            --danger-dark: #dc2626;
            --danger-light: #fee2e2;
            --info: #3b82f6;
            --info-light: #dbeafe;
            --background: #f8fafc;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Roboto, -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            min-height: 100vh;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
            line-height: 1.5;
        }

        .app {
            max-width: 100%;
            margin: 0 auto;
            background: var(--surface);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            padding: 20px 16px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.15);
        }

        .header h1 {
            font-size: 1.3em;
            font-weight: 700;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .nav {
            display: flex;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 66px;
            z-index: 99;
            padding: 4px;
            gap: 4px;
        }

        .nav button {
            flex: 1;
            padding: 12px 4px;
            border: none;
            background: transparent;
            font-size: 0.9em;
            font-weight: 600;
            color: var(--text-muted);
            border-radius: 10px;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .nav button.active {
            color: var(--primary);
            background: var(--primary-light);
        }

        .content {
            flex: 1;
            padding: 20px 16px;
            overflow-y: auto;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: var(--surface);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .card h3 {
            font-size: 1.1em;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text-main);
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 0.8em;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-with-scan {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .input-with-scan input, .form-group input {
            flex: 1;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 1em;
            transition: all 0.2s;
            background: #f8fafc;
            color: var(--text-main);
            width: 100%;
        }

        .input-with-scan input:focus, .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--surface);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        .scan-btn {
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 52px;
            transition: all 0.2s;
            flex-shrink: 0;
            box-shadow: 0 4px 6px rgba(99, 102, 241, 0.2);
        }

        .scan-btn:active {
            transform: scale(0.95);
        }

        .scan-btn.scanning {
            background: var(--danger);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.8; }
            100% { opacity: 1; }
        }

        #reader {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            margin-top: 12px;
            display: none;
            border: 2px dashed var(--primary);
            background: #000;
        }

        #reader.active {
            display: block;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 0.95em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 6px rgba(99, 102, 241, 0.2); }
        .btn-primary:hover { background: var(--primary-dark); }
        
        .btn-success { background: var(--success); color: white; box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2); }
        .btn-success:hover { background: var(--success-dark); }

        .btn-warning { background: var(--warning); color: white; }
        .btn-info { background: var(--info); color: white; }
        .btn-danger { background: var(--danger); color: white; }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
        }
        .btn-outline:hover {
            background: #f1f5f9;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 16px 0;
        }

        .btn-group .btn {
            margin-bottom: 0;
        }

        .alert {
            padding: 14px 16px;
            border-radius: 12px;
            margin: 14px 0;
            font-size: 0.9em;
            font-weight: 600;
            animation: fadeIn 0.2s ease;
        }

        .alert-success { background: var(--success-light); color: var(--success-dark); }
        .alert-error { background: var(--danger-light); color: var(--danger-dark); }
        .alert-info { background: var(--info-light); color: #1d4ed8; }

        .table-container {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin: 16px 0;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: var(--surface);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85em;
            text-align: left;
        }

        th {
            background: #f1f5f9;
            padding: 14px 12px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.8em;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        td {
            padding: 14px 12px;
            border-bottom: 1px solid var(--border);
            color: var(--text-main);
        }

        tr:last-child td {
            border-bottom: none;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.9em;
        }
        .badge-danger { background: var(--danger-light); color: var(--danger-dark); }
        .badge-success { background: var(--success-light); color: var(--success-dark); }
        .badge-neutral { background: #f1f5f9; color: var(--text-muted); }

        .icon-btn {
            background: none;
            border: none;
            font-size: 1.2em;
            padding: 6px;
            cursor: pointer;
            color: var(--text-muted);
            border-radius: 8px;
            transition: all 0.2s;
        }

        .icon-btn:hover { background: #f1f5f9; color: var(--primary); }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--surface);
            border-radius: 20px;
            padding: 24px;
            width: 92%;
            max-width: 440px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            animation: modalUp 0.25s ease-out;
        }

        @keyframes modalUp {
            from { transform: scale(0.9) translateY(20px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 16px 0;
        }

        .stat-card {
            background: #f8fafc;
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 14px;
        }

        .stat-card h3 {
            font-size: 0.8em;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card .value {
            font-size: 1.3em;
            font-weight: 700;
            color: var(--text-main);
        }

        .stat-card.highlight {
            background: linear-gradient(135deg, var(--primary) 0%, #7c3aed 100%);
            border: none;
        }
        .stat-card.highlight h3 { color: rgba(255,255,255,0.8); }
        .stat-card.highlight .value { color: white; }

        .section-title {
            font-size: 1.1em;
            font-weight: 700;
            margin: 24px 0 12px;
            color: var(--text-main);
        }

        @media (min-width: 768px) {
            .app {
                max-width: 480px;
                margin: 40px auto;
                border-radius: 24px;
                min-height: calc(100vh - 80px);
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
                border: 1px solid var(--border);
            }
            .header {
                border-top-left-radius: 23px;
                border-top-right-radius: 23px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <h1>📦 Dream Market Inventaire</h1>
        </div>
        <div class="nav">
            <button class="active" data-page="saisie">📝 Saisie</button>
            <button data-page="base">📂 Base Articles</button>
            <button data-page="resultat">📊 Résultats</button>
        </div>
        <div class="content">
            
            <div id="saisie" class="page active">
                <div class="card">
                    <div class="form-group">
                        <label>Code Article</label>
                        <div class="input-with-scan">
                            <input type="text" id="codeArticle" placeholder="Scanner ou saisir le code..." autofocus>
                            <button class="scan-btn" id="scanToggle" title="Scanner avec la caméra">📷</button>
                        </div>
                        <div id="reader"></div>
                    </div>
                    <div class="form-group">
                        <label>Comptage Physique</label>
                        <input type="number" id="comptage" placeholder="Quantité comptée..." min="0">
                    </div>
                    <button class="btn btn-primary" id="btnValider">✅ Valider la Saisie</button>
                    <button class="btn btn-outline" id="btnReset">🔄 Réinitialiser</button>
                    <div id="messageSaisie"></div>
                </div>
                
                <h3 class="section-title">Dernières saisies</h3>
                <div class="table-container">
                    <table id="tableSaisies">
                        <thead><tr><th>Code</th><th>Désignation</th><th>Qté</th><th>Heure</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <div id="base" class="page">
                <div class="card">
                    <h3>Gestion de la Base</h3>
                    <div class="btn-group">
                        <button class="btn btn-info" id="btnImport">📥 Importer</button>
                        <button class="btn btn-success" id="btnExportBase">📤 Exporter</button>
                    </div>
                    <button class="btn btn-outline" id="btnAjouterArticle">➕ Ajouter un article</button>
                    <button class="btn btn-danger" id="btnViderBase" style="background:transparent; border:1px solid var(--danger); color:var(--danger)">🗑️ Vider la base</button>
                    <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none">
                    <div id="messageBase"></div>
                </div>
                <div class="table-container">
                    <table id="tableBase">
                        <thead><tr><th>Code</th><th>Désignation</th><th>Prix (DH)</th><th>Stock</th><th style="width:80px; text-align:center">Actions</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <div id="resultat" class="page">
                <div class="stats" id="statsContainer"></div>
                <div class="btn-group">
                    <button class="btn btn-success" id="btnExportResExcel">📊 Excel</button>
                    <button class="btn btn-info" id="btnExportResPDF">📄 PDF</button>
                </div>
                <button class="btn btn-outline" id="btnActualiser">🔄 Actualiser les données</button>
                <div id="messageResultat"></div>
                
                <div class="table-container">
                    <table id="tableResultat">
                        <thead><tr><th>Code</th><th>Désignation</th><th>Stock</th><th>Compté</th><th>Écart</th><th>Val. Écart</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
            
        </div>
    </div>

    <div class="modal" id="articleModal">
        <div class="modal-content">
            <h3 id="modalTitle">Ajouter un article</h3>
            <div class="form-group">
                <label>Code</label>
                <input type="text" id="modalCode" placeholder="Code article">
            </div>
            <div class="form-group">
                <label>Désignation</label>
                <input type="text" id="modalDesignation" placeholder="Nom de l'article">
            </div>
            <div class="form-group">
                <label>Prix d'achat (DH)</label>
                <input type="number" id="modalPrix" placeholder="0.00" step="0.01">
            </div>
            <div class="form-group">
                <label>Stock théorique</label>
                <input type="number" id="modalStock" placeholder="0" step="1">
            </div>
            <input type="hidden" id="modalEditIndex" value="-1">
            <button class="btn btn-primary" id="btnSaveArticle">💾 Enregistrer</button>
            <button class="btn btn-outline" id="btnCancelModal">Annuler</button>
        </div>
    </div>

    <script>
        // === DONNÉES ===
        let baseArticles = JSON.parse(localStorage.getItem('baseArticles')) || [];
        let saisies = JSON.parse(localStorage.getItem('saisies')) || [];

        function sauvegarderBase() { localStorage.setItem('baseArticles', JSON.stringify(baseArticles)); }
        function sauvegarderSaisies() { localStorage.setItem('saisies', JSON.stringify(saisies)); }

        // === NAVIGATION ===
        function showPage(pageName) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(pageName).classList.add('active');
            document.querySelector(`.nav button[data-page="${pageName}"]`).classList.add('active');
            if (pageName === 'base') afficherBase();
            if (pageName === 'resultat') afficherResultats();
            if (pageName === 'saisie') {
                setTimeout(() => { document.getElementById('codeArticle').focus(); }, 100);
                afficherSaisies();
            }
        }

        document.querySelectorAll('.nav button').forEach(btn => {
            btn.addEventListener('click', (e) => showPage(e.target.dataset.page));
        });

        // === SAISIE ===
        function ajouterSaisie() {
            const code = document.getElementById('codeArticle').value.trim();
            const comptage = parseInt(document.getElementById('comptage').value);
            const msg = document.getElementById('messageSaisie');
            
            if (!code) return msg.innerHTML = '<div class="alert alert-error">Code article requis</div>';
            if (isNaN(comptage) || comptage < 0) return msg.innerHTML = '<div class="alert alert-error">Comptage invalide</div>';
            
            const article = baseArticles.find(a => a.code === code);
            if (!article) return msg.innerHTML = '<div class="alert alert-error">Article introuvable dans la base</div>';
            
            const index = saisies.findIndex(s => s.code === code);
            const nouvelle = { code, designation: article.designation, comptage, date: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) };
            
            if (index !== -1) saisies[index] = nouvelle;
            else saisies.push(nouvelle);
            
            sauvegarderSaisies();
            afficherSaisies();
            msg.innerHTML = '<div class="alert alert-success">✅ Saisie enregistrée avec succès</div>';
            
            document.getElementById('codeArticle').value = '';
            document.getElementById('comptage').value = '';
            document.getElementById('codeArticle').focus();
            setTimeout(() => { msg.innerHTML = ''; }, 3000);
        }

        function afficherSaisies() {
            const tbody = document.querySelector('#tableSaisies tbody');
            tbody.innerHTML = '';
            [...saisies].reverse().slice(0, 5).forEach(s => {
                tbody.innerHTML += `<tr><td><strong>${s.code}</strong></td><td>${s.designation}</td><td><span class="badge badge-neutral">${s.comptage}</span></td><td>${s.date}</td></tr>`;
            });
        }

        // === SCAN CAMÉRA CORRIGÉ ===
        let html5QrCode = null;
        let scanning = false;
        const scanBtn = document.getElementById('scanToggle');
        const readerDiv = document.getElementById('reader');

        scanBtn.addEventListener('click', async () => {
            if (!scanning) {
                try {
                    await navigator.mediaDevices.getUserMedia({ video: true });
                    startScan();
                } catch (err) {
                    alert("Accès caméra refusé ou indisponible. Vérifiez les autorisations.");
                }
            } else {
                stopScan();
            }
        });

        function startScan() {
            if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
            readerDiv.classList.add('active');
            
            const config = { 
                fps: 15, 
                qrbox: (w, h) => { return { width: Math.min(w * 0.8, 280), height: 160 }; },
                aspectRatio: 1.777778
            };

            html5QrCode.start(
                { facingMode: { exact: "environment" } }, 
                config,
                (decodedText) => {
                    document.getElementById('codeArticle').value = decodedText;
                    stopScan();
                    if (window.navigator.vibrate) window.navigator.vibrate([100, 50, 100]);
                    setTimeout(() => { document.getElementById('comptage').focus(); }, 200);
                },
                () => {}
            ).then(() => {
                scanning = true;
                scanBtn.classList.add('scanning');
                scanBtn.innerHTML = '⏹️';
            }).catch(() => {
                html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
                    document.getElementById('codeArticle').value = decodedText;
                    stopScan();
                    if (window.navigator.vibrate) window.navigator.vibrate(100);
                    setTimeout(() => { document.getElementById('comptage').focus(); }, 200);
                }).then(() => {
                    scanning = true;
                    scanBtn.classList.add('scanning');
                    scanBtn.innerHTML = '⏹️';
                }).catch(e => {
                    alert('Erreur caméra : ' + e.message);
                    stopScan();
                });
            });
        }

        function stopScan() {
            if (html5QrCode && scanning) {
                html5QrCode.stop().then(() => {
                    scanning = false;
                    scanBtn.classList.remove('scanning');
                    scanBtn.innerHTML = '📷';
                    readerDiv.classList.remove('active');
                    document.getElementById('codeArticle').focus();
                });
            }
        }

        // === BASE DE DONNÉES ===
        function afficherBase() {
            const tbody = document.querySelector('#tableBase tbody');
            tbody.innerHTML = baseArticles.map((a, index) => `
                <tr>
                    <td><strong>${a.code}</strong></td>
                    <td>${a.designation}</td>
                    <td>${a.prix.toFixed(2)} DH</td>
                    <td>${a.stock}</td>
                    <td style="text-align:center; white-space:nowrap">
                        <button class="icon-btn" onclick="modifierArticle(${index})">✏️</button>
                        <button class="icon-btn" onclick="supprimerArticle(${index})" style="color:var(--danger)">🗑️</button>
                    </td>
                </tr>
            `).join('');
        }

        const modal = document.getElementById('articleModal');
        document.getElementById('btnAjouterArticle').addEventListener('click', () => {
            document.getElementById('modalTitle').textContent = 'Ajouter un article';
            document.getElementById('modalCode').value = '';
            document.getElementById('modalDesignation').value = '';
            document.getElementById('modalPrix').value = '';
            document.getElementById('modalStock').value = '';
            document.getElementById('modalEditIndex').value = '-1';
            modal.classList.add('active');
        });

        document.getElementById('btnCancelModal').addEventListener('click', () => { modal.classList.remove('active'); });

        document.getElementById('btnSaveArticle').addEventListener('click', () => {
            const code = document.getElementById('modalCode').value.trim();
            const designation = document.getElementById('modalDesignation').value.trim();
            const prix = parseFloat(document.getElementById('modalPrix').value);
            const stock = parseInt(document.getElementById('modalStock').value);
            const editIndex = parseInt(document.getElementById('modalEditIndex').value);

            if (!code || !designation) return alert('Champs requis');
            if (isNaN(prix) || isNaN(stock)) return alert('Valeurs numériques invalides');

            const article = { code, designation, prix, stock };

            if (editIndex === -1) {
                if (baseArticles.some(a => a.code === code)) return alert('Le code existe déjà');
                baseArticles.push(article);
            } else {
                baseArticles[editIndex] = article;
            }

            sauvegarderBase();
            afficherBase();
            modal.classList.remove('active');
        });

        window.modifierArticle = function(index) {
            const article = baseArticles[index];
            document.getElementById('modalTitle').textContent = 'Modifier l\'article';
            document.getElementById('modalCode').value = article.code;
            document.getElementById('modalDesignation').value = article.designation;
            document.getElementById('modalPrix').value = article.prix;
            document.getElementById('modalStock').value = article.stock;
            document.getElementById('modalEditIndex').value = index;
            modal.classList.add('active');
        };

        window.supprimerArticle = function(index) {
            if (confirm('Supprimer cet article ?')) {
                baseArticles.splice(index, 1);
                sauvegarderBase();
                afficherBase();
            }
        };

        // === IMPORT EXCEL CORRIGÉ ===
        document.getElementById('btnImport').addEventListener('click', () => { document.getElementById('fileInput').click(); });
        document.getElementById('fileInput').addEventListener('change', importerExcel);

        function importerExcel(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = e.target.result;
                    const wb = XLSX.read(data, { type: 'binary' });
                    if (!wb.SheetNames.length) return;
                    
                    const ws = wb.Sheets[wb.SheetNames[0]];
                    const allRows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
                    const cleanRows = allRows.filter(row => row.some(c => c !== null && c.toString().trim() !== ''));
                    
                    const keywords = ['code', 'désignation', 'designation', 'prix', 'stock', 'ref'];
                    let headerRowIndex = 0;
                    for (let i = 0; i < cleanRows.length; i++) {
                        if (keywords.some(kw => cleanRows[i].join(' ').toLowerCase().includes(kw))) { headerRowIndex = i; break; }
                    }

                    const headers = cleanRows[headerRowIndex].map(h => h.toString().trim().toLowerCase());
                    const getIndex = (keys) => headers.findIndex(h => keys.some(k => h.includes(k)));

                    const idxCode = getIndex(['code', 'réf', 'ref', 'ean']);
                    const idxDes = getIndex(['désignation', 'designation', 'libellé', 'nom', 'produit']);
                    const idxPrix = getIndex(['prix', 'achat', 'pa']);
                    const idxStock = getIndex(['stock', 'physique', 'qté', 'quantité']);

                    if (idxCode === -1 || idxDes === -1) {
                        document.getElementById('messageBase').innerHTML = '<div class="alert alert-error">Colonnes Code ou Désignation manquantes.</div>';
                        return;
                    }

                    baseArticles = cleanRows.slice(headerRowIndex + 1).map(row => {
                        const code = row[idxCode] ? row[idxCode].toString().trim() : '';
                        const designation = row[idxDes] ? row[idxDes].toString().trim() : '';
                        let prix = idxPrix !== -1 && row[idxPrix] ? parseFloat(row[idxPrix].toString().replace(',', '.').replace(/[^\d.]/g, '')) : 0;
                        let stock = idxStock !== -1 && row[idxStock] ? parseInt(row[idxStock].toString().replace(/[^\d]/g, '')) : 0;
                        return { code, designation, prix: isNaN(prix) ? 0 : prix, stock: isNaN(stock) ? 0 : stock };
                    }).filter(a => a.code !== '');

                    sauvegarderBase();
                    afficherBase();
                    document.getElementById('messageBase').innerHTML = `<div class="alert alert-success">✅ ${baseArticles.length} articles importés !</div>`;
                    event.target.value = '';
                } catch (err) {
                    alert('Erreur importation: ' + err.message);
                }
            };
            reader.readAsBinaryString(file);
        }

        document.getElementById('btnExportBase').addEventListener('click', () => {
            if (!baseArticles.length) return alert('Base vide');
            const data = [['Code', 'Désignation', 'Prix d\'achat (DH)', 'Stock'], ...baseArticles.map(a => [a.code, a.designation, a.prix, a.stock])];
            const ws = XLSX.utils.aoa_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Base");
            XLSX.writeFile(wb, "base_articles.xlsx");
        });

        document.getElementById('btnViderBase').addEventListener('click', () => {
            if (confirm('Vider la base et l\'historique des saisies ?')) {
                baseArticles = []; saisies = [];
                sauvegarderBase(); sauvegarderSaisies();
                afficherBase(); afficherSaisies();
            }
        });

        // === RÉSULTATS ===
        function afficherResultats() {
            const tbody = document.querySelector('#tableResultat tbody');
            let nbEcarts = 0, valeurTotale = 0;
            
            tbody.innerHTML = baseArticles.map(article => {
                const saisie = saisies.find(s => s.code === article.code);
                const comptage = saisie ? saisie.comptage : 0;
                const ecart = comptage - article.stock;
                const valEcart = ecart * article.prix;
                
                if (ecart !== 0) { nbEcarts++; valeurTotale += Math.abs(valEcart); }
                
                let badgeEcart = `<span class="badge badge-neutral">0</span>`;
                let styleVal = '';
                if(ecart > 0) { badgeEcart = `<span class="badge badge-success">+${ecart}</span>`; styleVal = 'color:var(--success-dark); font-weight:bold'; }
                if(ecart < 0) { badgeEcart = `<span class="badge badge-danger">${ecart}</span>`; styleVal = 'color:var(--danger-dark); font-weight:bold'; }

                return `<tr>
                    <td><strong>${article.code}</strong></td>
                    <td>${article.designation}</td>
                    <td>${article.stock}</td>
                    <td>${saisie ? comptage : '-'}</td>
                    <td>${badgeEcart}</td>
                    <td style="${styleVal}">${valEcart !== 0 ? (valEcart > 0 ? '+' : '') + valEcart.toFixed(2) + ' DH' : '0 DH'}</td>
                </tr>`;
            }).join('');

            document.getElementById('statsContainer').innerHTML = `
                <div class="stat-card"><h3>Articles Base</h3><div class="value">${baseArticles.length}</div></div>
                <div class="stat-card"><h3>Articles Comptés</h3><div class="value">${saisies.length}</div></div>
                <div class="stat-card"><h3>Total Écarts</h3><div class="value">${nbEcarts}</div></div>
                <div class="stat-card highlight"><h3>Valeur Écarts</h3><div class="value">${valeurTotale.toFixed(2)} DH</div></div>`;
        }

        document.getElementById('btnActualiser').addEventListener('click', () => {
            afficherResultats();
            const msg = document.getElementById('messageResultat');
            msg.innerHTML = '<div class="alert alert-info">🔄 Données actualisées</div>';
            setTimeout(() => { msg.innerHTML = ''; }, 2000);
        });

        document.getElementById('btnExportResExcel').addEventListener('click', () => {
            const data = [['Code', 'Désignation', 'Prix Achat (DH)', 'Stock Théorique', 'Comptage', 'Écart', 'Valeur Écart (DH)'],
                ...baseArticles.map(a => {
                    const s = saisies.find(s => s.code === a.code);
                    const c = s ? s.comptage : 0;
                    const e = c - a.stock;
                    return [a.code, a.designation, a.prix, a.stock, c, e, (e * a.prix).toFixed(2)];
                })];
            const ws = XLSX.utils.aoa_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Résultats");
            XLSX.writeFile(wb, "resultats_inventaire.xlsx");
        });

        document.getElementById('btnExportResPDF').addEventListener('click', () => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(16);
            doc.text('Rapport d\'inventaire Dream Market', 14, 20);
            doc.autoTable({
                head: [['Code', 'Désignation', 'Prix', 'Stock', 'Compté', 'Écart', 'Val. Écart']],
                body: baseArticles.map(a => {
                    const s = saisies.find(s => s.code === a.code);
                    const c = s ? s.comptage : 0;
                    const e = c - a.stock;
                    return [a.code, a.designation, `${a.prix.toFixed(2)} DH`, a.stock, c, e, `${(e * a.prix).toFixed(2)} DH`];
                }),
                startY: 30, headStyles: { fillColor: [99, 102, 241] }
            });
            doc.save('resultats_inventaire.pdf');
        });

        // Touches clavier
        document.getElementById('codeArticle').addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); document.getElementById('comptage').focus(); } });
        document.getElementById('comptage').addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); ajouterSaisie(); } });
        document.getElementById('btnValider').addEventListener('click', ajouterSaisie);
        document.getElementById('btnReset').addEventListener('click', () => { document.getElementById('codeArticle').value = ''; document.getElementById('comptage').value = ''; document.getElementById('codeArticle').focus(); });

        // Initialisation
        afficherBase();
        afficherSaisies();
    </script>
</body>
</html>
